<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D4 装备提升计算器</title>
</head>
<body>
  <header>
    <h1>⚔ D4 GEAR CALCULATOR</h1>
    <div class="global-bar">
      <div class="g-field">
        <label for="g-crit-rate">Base Crit</label>
        <input id="g-crit-rate" type="number" value="5" min="0" max="100" step="0.1">
        <span class="unit">%</span>
      </div>
      <div class="g-field">
        <label for="g-skill-bonus">Skill Bonus</label>
        <input id="g-skill-bonus" type="number" value="0" min="0" step="1">
        <span class="unit">%</span>
      </div>
    </div>
    <div class="header-right">
      <button class="hbtn" id="btn-export">导出</button>
      <button class="hbtn" id="btn-import">导入</button>
      <button class="hbtn danger" id="btn-clear">清空</button>
    </div>
  </header>

  <div class="main">
    <div class="doll-panel">
      <div class="doll-title">装备槽位</div>
      <div class="doll-grid" id="doll-grid"></div>
    </div>

    <div class="editor-panel">
      <div class="editor-bar" id="editor-bar">
        <span class="editor-bar-name" id="editor-bar-name">选择装备槽位</span>
        <span class="editor-bar-type" id="editor-bar-type"></span>
        <div class="editor-bar-actions" id="editor-bar-actions"></div>
      </div>
      <div class="editor-body single" id="editor-body">
        <div class="empty-editor">
          <div class="empty-rune">🔱</div>
          <div class="empty-text">选择左侧装备槽位</div>
        </div>
      </div>
    </div>

    <div class="results-panel">
      <div class="res-header">
        <div class="res-header-title">伤害面板</div>
      </div>
      <div class="res-body" id="results-body"></div>
    </div>
  </div>

  <input type="file" id="import-file" accept=".json" style="display:none">
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
